## SLAM parameters
Results:
  save_results: True
  save_dir: "results"
  save_trj: True
  save_trj_kf_intv: 5
  use_gui: True
  eval_rendering: True
  eval_real_scan_metrics: True
  use_wandb: False

Dataset:
  type: 'tum'
  sensor_type: 'depth'
  pcd_downsample: 8
  pcd_downsample_init: 4
  adaptive_pointsize: True
  point_size: 0.004

Training:
  #Initialization
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 10
  # Tracking and Mapping
  tracking_itr_num: 100
  mapping_itr_num: 200
  gaussian_update_every: 100
  gaussian_update_offset: 50
  gaussian_th: 0.6
  gaussian_extent: 0.35
  gaussian_reset: 2001
  size_threshold: 10
  kf_interval: 3
  window_size: 12
  pose_window: 5
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  alpha: 0.9
  kf_translation: 0.025
  kf_min_translation: 0.008
  kf_overlap: 0.92
  kf_cutoff: 0.3
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: True
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001



## 3DGS default parameters
opt_params:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False

Quality:
  enabled: True
  output_path: null
  flush_every_frame: True
  bbox_min: [-0.15, -0.15, 0.2]
  bbox_max: [0.45, 0.25, 0.75]
  coverage_grid_size: 32
  gaussian_opacity_th: 0.2
  opacity_th: 0.2
  scale_ref: 0.015
  aniso_ref: 4.0
  obs_ref: 5.0
  unc_w_scale: 0.4
  unc_w_aniso: 0.3
  unc_w_obs: 0.3
  q_min: [0.0, 0.0, 0.0]
  q_max: [1.0, 1.0, 0.3]

EvalMetrics:
  validation_interval: 1
