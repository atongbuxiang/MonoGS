Results:
  save_results: True
  save_dir: "results"
  save_trj: False
  save_trj_kf_intv: 0
  use_gui: True
  eval_rendering: False
  eval_real_scan_metrics: True
  use_wandb: False

Dataset:
  dataset_path: "live/realsense_d455_rgb"
  sensor_type: 'monocular'
  # Omit this for unlimited live capture, or set a fixed number for an automatic stop.
  # max_frames: 600
  pcd_downsample: 32
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01
  type: 'realsense'

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 50
  mapping_itr_num: 50
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 8
  pose_window: 3
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  single_thread: False
  spherical_harmonics: True

  kf_translation: 0.05
  kf_min_translation: 0.02
  kf_overlap: 0.9
  kf_cutoff: 0.3
  prune_mode: 'slam'

  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001


opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False

Quality:
  enabled: True
  # With .csv, each frame is flushed immediately for real-time consumption.
  output_path: null
  flush_every_frame: True
  bbox_min: [-2.0, -2.0, -2.0]
  bbox_max: [2.0, 2.0, 2.0]
  coverage_grid_size: 32
  gaussian_opacity_th: 0.2
  opacity_th: 0.2
  scale_ref: 0.03
  aniso_ref: 4.0
  obs_ref: 5.0
  unc_w_scale: 0.4
  unc_w_aniso: 0.3
  unc_w_obs: 0.3
  q_min: [0.0, 0.0, 0.0]
  q_max: [1.0, 1.0, 0.3]
