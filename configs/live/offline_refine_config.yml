Results:
  save_results: True
  save_dir: "results/offline_refine"
  save_trj: True
  save_trj_kf_intv: 5
  use_gui: False
  eval_rendering: True
  eval_real_scan_metrics: True
  use_wandb: False

Dataset:
  dataset_path: "datasets/desk01"
  pcd_downsample: 8
  pcd_downsample_init: 4
  single_thread: False
  type: 'tum'
  sensor_type: 'depth'
  adaptive_pointsize: True
  point_size: 0.01
  Calibration:
    fx: 321.31329345703125
    fy: 320.9627990722656
    cx: 322.90472412109375
    cy: 185.63742065429688
    k1: 0.0
    k2: 0.0
    p1: 0.0
    p2: 0.0
    k3: 0.0
    distorted: false
    width: 640
    height: 360
    depth_scale: 1000.0

Training:
  #Initialization
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  # Tracking and Mapping
  tracking_itr_num: 100
  mapping_itr_num: 150
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 12
  pose_window: 5
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  alpha: 0.9
  kf_translation: 0.03
  kf_min_translation: 0.01
  kf_overlap: 0.9
  kf_cutoff: 0.3
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: True
  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

## 3DGS default parameters
opt_params:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False

EvalMetrics:
  validation_interval: 1

Quality:
  enabled: True
  # With .csv, each frame is flushed immediately for real-time consumption.
  output_path: null
  flush_every_frame: True
  bbox_min: [-0.5, -0.5, -0.5]
  bbox_max: [0.5, 0.5, 0.5]
  coverage_grid_size: 32
  gaussian_opacity_th: 0.2
  opacity_th: 0.2
  scale_ref: 0.03
  aniso_ref: 4.0
  obs_ref: 5.0
  unc_w_scale: 0.4
  unc_w_aniso: 0.3
  unc_w_obs: 0.3
  q_min: [0.0, 0.0, 0.0]
  q_max: [1.0, 1.0, 0.3]
